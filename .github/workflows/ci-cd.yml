name: CI/CD Pipeline

on:

  push:

    branches:

      - main

  pull_request:

    branches:

      - main

env:

  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}

  GKE_ZONE: ${{ secrets.GKE_CLUSTER_ZONE }}

jobs:

  build:

    name: Build and Lint

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Set up Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "20"

      - name: Install backend dependencies

        run: npm install

        working-directory: backend

      - name: Install frontend dependencies

        run: npm install

        working-directory: frontend

      - name: Build frontend

        run: npm run build

        working-directory: frontend

        env:

          REACT_APP_API_URL: /api

      - name: Build backend Docker image

        run: docker build -t backend-test .

        working-directory: backend

      - name: Build frontend Docker image

        run: docker build -t frontend-test --build-arg REACT_APP_API_URL=/api .

        working-directory: frontend

  deploy:

    name: Deploy to GKE

    runs-on: ubuntu-latest

    needs: build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Login to GCP

        uses: google-github-actions/auth@v2

        with:

          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud

        uses: google-github-actions/setup-gcloud@v2

        with:

          project_id: ${{ env.PROJECT_ID }}

      - name: Allow docker to push to GCP

        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Create image tag from git commit

        id: tag

        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build backend and tag it

        run: docker build -t ${{ env.REGISTRY_URL }}/backend:${{ steps.tag.outputs.IMAGE_TAG }} -t ${{ env.REGISTRY_URL }}/backend:latest .

        working-directory: backend

      - name: Push backend to Artifact Registry

        run: |

          docker push ${{ env.REGISTRY_URL }}/backend:${{ steps.tag.outputs.IMAGE_TAG }}

          docker push ${{ env.REGISTRY_URL }}/backend:latest

      - name: Build frontend and tag it

        run: docker build -t ${{ env.REGISTRY_URL }}/frontend:${{ steps.tag.outputs.IMAGE_TAG }} -t ${{ env.REGISTRY_URL }}/frontend:latest --build-arg REACT_APP_API_URL=/api .

        working-directory: frontend

      - name: Push frontend to Artifact Registry

        run: |

          docker push ${{ env.REGISTRY_URL }}/frontend:${{ steps.tag.outputs.IMAGE_TAG }}

          docker push ${{ env.REGISTRY_URL }}/frontend:latest

      - name: Connect kubectl to our GKE cluster

        run: gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} --zone ${{ env.GKE_ZONE }} --project ${{ env.PROJECT_ID }}

      - name: Run database migrations

        run: kubectl run db-migrate --image=${{ env.REGISTRY_URL }}/backend:${{ steps.tag.outputs.IMAGE_TAG }} --restart=Never --rm --attach -n employee-portal --env="DB_HOST=${{ secrets.DB_HOST }}" --env="DB_PORT=5432" --env="DB_NAME=employee_portal" --env="DB_USER=empuser" --env="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" -- node src/db/migrate.js

        timeout-minutes: 5

      - name: Update backend deployment with new image

        run: kubectl set image deployment/employee-portal-backend backend=${{ env.REGISTRY_URL }}/backend:${{ steps.tag.outputs.IMAGE_TAG }} -n employee-portal

      - name: Wait for backend to finish deploying

        run: kubectl rollout status deployment/employee-portal-backend -n employee-portal --timeout=120s

      - name: Update frontend deployment with new image

        run: kubectl set image deployment/employee-portal-frontend frontend=${{ env.REGISTRY_URL }}/frontend:${{ steps.tag.outputs.IMAGE_TAG }} -n employee-portal

      - name: Wait for frontend to finish deploying

        run: kubectl rollout status deployment/employee-portal-frontend -n employee-portal --timeout=120s

      - name: Check everything is running

        run: |

          kubectl get pods -n employee-portal

          kubectl get services -n employee-portal

          kubectl get ingress -n employee-portal

      - name: Rollback if something went wrong

        if: failure()

        run: |

          kubectl rollout undo deployment/employee-portal-backend -n employee-portal

          kubectl rollout undo deployment/employee-portal-frontend -n employee-portal
 